<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Dashboard - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Trainer Dashboard</h1>
            </div>
        </div>
        <div class="header-right">

                        <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>Sarah Johnson</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="trainer-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="trainer-members.html">
                            <i class="fas fa-users"></i>
                            My Members
                        </a>
                    </li>
                    </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Overview -->
            <section class="dashboard-overview">
                <h2>Welcome back, Sarah!</h2>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Assigned Members</h3>
                            <p class="stat-number">12</p>
                            <span class="stat-change positive">3 new this week</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Today's Sessions</h3>
                            <p class="stat-number">5</p>
                            <span class="stat-change neutral">2 completed</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-trophy"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Goals Achieved</h3>
                            <p class="stat-number">28</p>
                            <span class="stat-change positive">+4 this month</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Average Rating</h3>
                            <p class="stat-number">4.8</p>
                            <span class="stat-change positive">From 45 reviews</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer" class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Title</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Modal functions
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modalContainer').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalContainer').style.display = 'none';
        }

        // Member Management Functions
        function showMemberProfile(memberName) {
            const content = `
                <div class="member-profile">
                    <div class="profile-header">
                        <i class="fas fa-user-circle" style="font-size: 4rem; color: #11998e;"></i>
                        <h3>${memberName}</h3>
                        <p>Member ID: #001</p>
                    </div>
                    <div class="profile-details">
                        <div class="detail-group">
                            <h4>Physical Stats</h4>
                            <p>Weight: 75kg | Height: 175cm | BMI: 24.5</p>
                            <p>Body Fat: 18% | Muscle Mass: 45kg</p>
                        </div>
                        <div class="detail-group">
                            <h4>Fitness Goals</h4>
                            <p>Primary: Weight Loss (Target: 70kg)</p>
                            <p>Secondary: Improve Cardiovascular Health</p>
                        </div>
                        <div class="detail-group">
                            <h4>Progress Summary</h4>
                            <p>Weight Lost: 3kg in 4 weeks</p>
                            <p>Workout Attendance: 85%</p>
                            <p>Diet Plan Compliance: 90%</p>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-trainer" onclick="editMemberProfile('${memberName}')">
                            <i class="fas fa-edit"></i> Edit Profile
                        </button>
                        <button class="btn btn-trainer" onclick="viewFullProgress('${memberName}')">
                            <i class="fas fa-chart-line"></i> View Progress
                        </button>
                    </div>
                </div>
            `;
            openModal(`${memberName} - Profile`, content);
        }

        function viewWorkoutPlan(memberName) {
            const content = `
                <div class="workout-plan">
                    <h4>Current Workout Plan - ${memberName}</h4>
                    <div class="plan-details">
                        <div class="exercise-item">
                            <h5>Monday - Upper Body</h5>
                            <ul>
                                <li>Bench Press: 4 sets x 12 reps</li>
                                <li>Shoulder Press: 3 sets x 10 reps</li>
                                <li>Tricep Dips: 3 sets x 15 reps</li>
                                <li>Lateral Raises: 3 sets x 12 reps</li>
                            </ul>
                        </div>
                        <div class="exercise-item">
                            <h5>Wednesday - Lower Body</h5>
                            <ul>
                                <li>Squats: 4 sets x 12 reps</li>
                                <li>Deadlifts: 3 sets x 10 reps</li>
                                <li>Lunges: 3 sets x 12 reps per leg</li>
                                <li>Calf Raises: 4 sets x 15 reps</li>
                            </ul>
                        </div>
                        <div class="exercise-item">
                            <h5>Friday - Full Body</h5>
                            <ul>
                                <li>Pull-ups: 3 sets x max reps</li>
                                <li>Push-ups: 3 sets x 15 reps</li>
                                <li>Planks: 3 sets x 60 seconds</li>
                                <li>Burpees: 3 sets x 10 reps</li>
                            </ul>
                        </div>
                    </div>
                    <div class="plan-actions">
                        <button class="btn btn-trainer" onclick="updateWorkoutPlan('${memberName}')">
                            <i class="fas fa-edit"></i> Update Plan
                        </button>
                        <button class="btn btn-trainer" onclick="printWorkoutPlan('${memberName}')">
                            <i class="fas fa-print"></i> Print Plan
                        </button>
                    </div>
                </div>
            `;
            openModal(`Workout Plan - ${memberName}`, content);
        }

        function viewDietPlan(memberName) {
            const content = `
                <div class="diet-plan">
                    <h4>Current Diet Plan - ${memberName}</h4>
                    <div class="plan-details">
                        <div class="meal-item">
                            <h5>Breakfast (7:00 AM)</h5>
                            <ul>
                                <li>Oatmeal with berries and nuts</li>
                                <li>Greek yogurt with honey</li>
                                <li>Green tea</li>
                                <li>Calories: ~450</li>
                            </ul>
                        </div>
                        <div class="meal-item">
                            <h5>Lunch (12:30 PM)</h5>
                            <ul>
                                <li>Grilled chicken breast (150g)</li>
                                <li>Brown rice (1 cup)</li>
                                <li>Mixed vegetables</li>
                                <li>Salad with olive oil dressing</li>
                                <li>Calories: ~550</li>
                            </ul>
                        </div>
                        <div class="meal-item">
                            <h5>Dinner (7:00 PM)</h5>
                            <ul>
                                <li>Grilled fish (200g)</li>
                                <li>Quinoa (1 cup)</li>
                                <li>Steamed vegetables</li>
                                <li>Fresh fruit salad</li>
                                <li>Calories: ~500</li>
                            </ul>
                        </div>
                        <div class="meal-item">
                            <h5>Snacks</h5>
                            <ul>
                                <li>Protein shake (post-workout)</li>
                                <li>Apple with almond butter</li>
                                <li>Mixed nuts (handful)</li>
                                <li>Calories: ~300</li>
                            </ul>
                        </div>
                    </div>
                    <div class="nutrition-summary">
                        <h5>Daily Nutrition Summary</h5>
                        <p>Total Calories: ~1800</p>
                        <p>Protein: 150g | Carbs: 180g | Fat: 60g</p>
                    </div>
                    <div class="plan-actions">
                        <button class="btn btn-trainer" onclick="updateDietPlan('${memberName}')">
                            <i class="fas fa-edit"></i> Update Plan
                        </button>
                        <button class="btn btn-trainer" onclick="printDietPlan('${memberName}')">
                            <i class="fas fa-print"></i> Print Plan
                        </button>
                    </div>
                </div>
            `;
            openModal(`Diet Plan - ${memberName}`, content);
        }

        // Quick Action Functions
        function createWorkoutPlan() {
            const content = `
                <div class="create-workout-plan">
                    <h4>Create New Workout Plan</h4>
                    <div class="form-group">
                        <label>Select Member:</label>
                        <select class="form-control">
                            <option>John Doe</option>
                            <option>Jane Smith</option>
                            <option>Mike Wilson</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Plan Type:</label>
                        <select class="form-control">
                            <option>Weight Loss</option>
                            <option>Muscle Building</option>
                            <option>Endurance</option>
                            <option>Strength Training</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Duration (weeks):</label>
                        <input type="number" class="form-control" value="4">
                    </div>
                    <div class="form-group">
                        <label>Difficulty Level:</label>
                        <select class="form-control">
                            <option>Beginner</option>
                            <option>Intermediate</option>
                            <option>Advanced</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Special Considerations:</label>
                        <textarea class="form-control" rows="3" placeholder="Injuries, limitations, etc..."></textarea>
                    </div>
                    <button class="btn btn-trainer" onclick="generateWorkoutPlan()">
                        <i class="fas fa-magic"></i> Generate Plan
                    </button>
                </div>
            `;
            openModal('Create Workout Plan', content);
        }

        function createDietPlan() {
            const content = `
                <div class="create-diet-plan">
                    <h4>Create New Diet Plan</h4>
                    <div class="form-group">
                        <label>Select Member:</label>
                        <select class="form-control">
                            <option>John Doe</option>
                            <option>Jane Smith</option>
                            <option>Mike Wilson</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Current Weight (kg):</label>
                        <input type="number" class="form-control" value="75">
                    </div>
                    <div class="form-group">
                        <label>Height (cm):</label>
                        <input type="number" class="form-control" value="175">
                    </div>
                    <div class="form-group">
                        <label>Target Weight (kg):</label>
                        <input type="number" class="form-control" value="70">
                    </div>
                    <div class="form-group">
                        <label>Activity Level:</label>
                        <select class="form-control">
                            <option>Sedentary</option>
                            <option>Lightly Active</option>
                            <option>Moderately Active</option>
                            <option>Very Active</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dietary Restrictions:</label>
                        <textarea class="form-control" rows="3" placeholder="Allergies, preferences, etc..."></textarea>
                    </div>
                    <button class="btn btn-trainer" onclick="generateDietPlan()">
                        <i class="fas fa-calculator"></i> Calculate & Generate
                    </button>
                </div>
            `;
            openModal('Create Diet Plan', content);
        }

        function reviewProgress() {
            const content = `
                <div class="progress-review">
                    <h4>Review Member Progress</h4>
                    <div class="form-group">
                        <label>Select Member:</label>
                        <select class="form-control">
                            <option>John Doe</option>
                            <option>Jane Smith</option>
                            <option>Mike Wilson</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time Period:</label>
                        <select class="form-control">
                            <option>Last Week</option>
                            <option>Last Month</option>
                            <option>Last 3 Months</option>
                            <option>Last 6 Months</option>
                        </select>
                    </div>
                    <div class="progress-summary">
                        <h5>Progress Analysis</h5>
                        <div class="progress-item">
                            <span>Weight Change:</span>
                            <span class="positive">-2.5 kg</span>
                        </div>
                        <div class="progress-item">
                            <span>Body Fat Change:</span>
                            <span class="positive">-1.8%</span>
                        </div>
                        <div class="progress-item">
                            <span>Strength Improvement:</span>
                            <span class="positive">+15%</span>
                        </div>
                        <div class="progress-item">
                            <span>Endurance Improvement:</span>
                            <span class="positive">+20%</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Recommendations:</label>
                        <textarea class="form-control" rows="4" placeholder="Based on progress analysis..."></textarea>
                    </div>
                    <button class="btn btn-trainer" onclick="saveProgressReview()">
                        <i class="fas fa-save"></i> Save Review & Send to Member
                    </button>
                </div>
            `;
            openModal('Review Progress', content);
        }

        // Schedule Functions
        function startSession(memberName) {
            alert(`Starting session with ${memberName}`);
        }

        function pauseSession(memberName) {
            alert(`Pausing session with ${memberName}`);
        }

        function completeSession(memberName) {
            alert(`Completing session with ${memberName}`);
        }

        function rescheduleSession(memberName) {
            alert(`Rescheduling session with ${memberName}`);
        }

        function viewSessionNotes(memberName) {
            alert(`Viewing session notes for ${memberName}`);
        }

        function rateSession(memberName) {
            alert(`Rating session with ${memberName}`);
        }

        // Helper Functions
        function editMemberProfile(memberName) {
            alert(`Editing profile for ${memberName}`);
        }

        function viewFullProgress(memberName) {
            alert(`Viewing full progress for ${memberName}`);
        }

        function updateWorkoutPlan(memberName) {
            alert(`Updating workout plan for ${memberName}`);
        }

        function printWorkoutPlan(memberName) {
            alert(`Printing workout plan for ${memberName}`);
        }

        function updateDietPlan(memberName) {
            alert(`Updating diet plan for ${memberName}`);
        }

        function printDietPlan(memberName) {
            alert(`Printing diet plan for ${memberName}`);
        }

        function generateWorkoutPlan() {
            alert('Workout plan generated successfully!');
            closeModal();
        }

        function generateDietPlan() {
            alert('Diet plan generated based on BMI and goals!');
            closeModal();
        }

        function saveProgressReview() {
            alert('Progress review saved and sent to member!');
            closeModal();
        }

        function setRating(rating) {
            // Rating functionality
            console.log('Rating:', rating);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('modalContainer');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
