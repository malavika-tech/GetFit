<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Members - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Trainer Dashboard</h1>
            </div>
        </div>
        <div class="header-right">

            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>Trainer</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="trainer-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="active">
                        <a href="trainer-members.html">
                            <i class="fas fa-users"></i>
                            My Members
                        </a>
                    </li>
                    </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Assigned Members -->
            <section class="assigned-members">
                <div class="section-header">
                    <h2>Assigned Members</h2>
                    
                </div>
                
                <div class="members-grid">
                    <!-- Members will be loaded here -->
                    <p style="grid-column: 1/-1; text-align:center; padding: 3rem; color: #999;">No members assigned to you yet.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Members page is already active
        });
    </script>
</body>
</html>
