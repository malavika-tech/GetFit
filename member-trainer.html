<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trainer - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Assigned Trainer Details</h1>
            </div>
        </div>
        <div class="header-right">

            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span id="headerMemberName">Member</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="member-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                                        <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li class="active">
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Assigned Trainer Details -->
            <section class="trainer-section">
                <h2>Assigned Trainer Details</h2>
                <div class="trainer-container">
                    <div class="trainer-card">
                        <div class="trainer-header">
                            <div class="trainer-avatar">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <div class="trainer-info">
                                <h3 id="trainerName">No Trainer Assigned</h3>
                            </div>
                        </div>
                        <div class="trainer-details">
                            <div class="detail-item">
                                <label>Specialization:</label>
                                <span id="trainerSpec">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Experience:</label>
                                <span id="trainerExp">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Certification:</label>
                                <span id="trainerCert">--</span>
                            </div>
                        </div>
                        <div class="trainer-contact">
                            <h4>Contact Details</h4>
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                                <span id="trainerEmail">--</span>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-phone"></i>
                                <span id="trainerPhone">--</span>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-clock"></i>
                                <span id="trainerHours">Please contact admin for assignment</span>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        function contactTrainer() {
            console.log('Contact trainer functionality - This would open a messaging interface');
        }

        function scheduleSession() {
            console.log('Schedule session functionality - This would open a booking calendar');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            const memberData = JSON.parse(localStorage.getItem('memberData') || '{}');
            if (memberData.fullName) {
                document.getElementById('headerMemberName').textContent = memberData.fullName;
            }

            // Load assigned trainer (This should ideally come from a central data store or server)
            const trainers = {};

            const assignments = JSON.parse(localStorage.getItem('trainerAssignments') || '{}');
            const memberId = memberData.id || 'M001';
            const assignedTrainerId = assignments[memberId];

            if (assignedTrainerId && trainers[assignedTrainerId]) {
                const t = trainers[assignedTrainerId];
                document.getElementById('trainerName').textContent = t.name;
                document.getElementById('trainerSpec').textContent = t.spec;
                document.getElementById('trainerExp').textContent = t.exp;
                document.getElementById('trainerCert').textContent = t.cert;
                document.getElementById('trainerEmail').textContent = t.email;
                document.getElementById('trainerPhone').textContent = t.phone;
                document.getElementById('trainerHours').textContent = 'Available: ' + t.hours;
            } else {
                // If no assignment, keep defaults or show "No trainer assigned"
                document.getElementById('trainerName').textContent = 'No Trainer Assigned';
                document.getElementById('trainerSpec').textContent = 'N/A';
                document.getElementById('trainerExp').textContent = 'N/A';
                document.getElementById('trainerCert').textContent = 'N/A';
                document.getElementById('trainerEmail').textContent = 'N/A';
                document.getElementById('trainerPhone').textContent = 'N/A';
                document.getElementById('trainerHours').textContent = 'Please contact admin for assignment';
            }
        });
    </script>
</body>
</html>
