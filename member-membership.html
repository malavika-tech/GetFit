<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Membership Status</h1>
            </div>
        </div>
        <div class="header-right">

            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span id="headerMemberName">Member</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="member-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li class="active">
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                                        <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li>
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Membership Status -->
            <section class="membership-section">
                <h2>Membership Status</h2>
                <div class="membership-container">
                    <div class="membership-card">
                        <div class="membership-header">
                            <h3>Membership</h3>
                            <span class="status-badge active">Active</span>
                        </div>
                        <div class="membership-details">
                            <div class="detail-item">
                                <label>Plan Type:</label>
                                <span id="memberPlanType">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Start Date:</label>
                                <span id="memberStartDate">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Expiry Date:</label>
                                <span id="memberExpiryDate">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Status:</label>
                                <span class="status-active">Active</span>
                            </div>
                        </div>
                        <div class="membership-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" id="memberProgressFill" style="width: 0%"></div>
                            </div>
                            <span class="progress-text" id="memberProgressText">--</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const d = JSON.parse(localStorage.getItem('memberData') || '{}');

            // Header name
            document.getElementById('headerMemberName').textContent = d.fullName || 'Member';

            // Plan details
            const planMap = { monthly: 1, quarterly: 3, yearly: 12 };
            const plan     = d.membershipPlan || 'monthly';
            const months   = planMap[plan] || 1;
            const planLabel = plan.charAt(0).toUpperCase() + plan.slice(1);

            const startDate = d.registrationDate ? new Date(d.registrationDate) : new Date();
            const expiryDate = new Date(startDate);
            expiryDate.setMonth(expiryDate.getMonth() + months);

            const fmt = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('memberPlanType').textContent   = planLabel;
            document.getElementById('memberStartDate').textContent  = startDate.toLocaleDateString('en-US', fmt);
            document.getElementById('memberExpiryDate').textContent = expiryDate.toLocaleDateString('en-US', fmt);

            // Progress bar: days elapsed vs total days
            const now        = new Date();
            const totalMs    = expiryDate - startDate;
            const elapsedMs  = Math.min(now - startDate, totalMs);
            const pct        = totalMs > 0 ? Math.max(0, Math.min(100, (elapsedMs / totalMs) * 100)).toFixed(0) : 0;
            const remaining  = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));

            document.getElementById('memberProgressFill').style.width = pct + '%';
            document.getElementById('memberProgressText').textContent =
                remaining > 0 ? remaining + ' days remaining' : 'Expired';
        });
    </script>
</body>
</html>
