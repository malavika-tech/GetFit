<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Login - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Online Fitness Management System</h1>
            </div>
        </div>
        <div class="header-right">

            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="trainer-icon">
                        <i class="fas fa-stopwatch"></i>
                    </div>
                    <h2>Trainer Login</h2>
                    <p>Enter your credentials to access the trainer dashboard</p>
                </div>

                <form class="login-form" id="trainerLoginForm">
                    <div class="form-group">
                        <label for="trainerUsername">
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input type="text" id="trainerUsername" name="trainerUsername" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="trainerPassword">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="trainerPassword" name="trainerPassword" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="toggleTrainerPassword()">
                                <i class="fas fa-eye" id="trainerToggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="trainerRemember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-trainer btn-full">
                        <i class="fas fa-sign-in-alt"></i>
                        Login to Trainer Dashboard
                    </button>
                </form>

                <div class="login-footer">
                    <p>Not a trainer? <a href="index.html">Go back to role selection</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleTrainerPassword() {
            const passwordInput = document.getElementById('trainerPassword');
            const toggleIcon = document.getElementById('trainerToggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('trainerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('trainerUsername').value.trim();
            const password = document.getElementById('trainerPassword').value;

            if (!username || !password) {
                alert('Please enter both username and password.');
                return;
            }

            // Show loading state on the correct button
            const submitBtn = document.querySelector('#trainerLoginForm button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            // Simulate login process (replace with real API call when backend is ready)
            setTimeout(() => {
                window.location.href = 'trainer-dashboard.html';
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 1500);
        });
    </script>
</body>
</html>
