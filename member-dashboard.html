<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Member Dashboard</h1>
            </div>
        </div>
        <div class="header-right">

                        <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>John Doe</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#dashboard">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                                        <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li>
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Overview -->
            <section class="dashboard-overview">
                <h2>Dashboard Overview</h2>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-weight"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Current Weight</h3>
                            <p class="stat-number">75 kg</p>
                            <span class="stat-change positive">-2 kg this month</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-ruler-vertical"></i>
                        </div>
                        <div class="stat-content">
                            <h3>BMI</h3>
                            <p class="stat-number">24.5</p>
                            <span class="stat-change neutral">Normal Range</span>
                        </div>
                    </div>

                    
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-trophy"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Goals</h3>
                            <p class="stat-number">3/5</p>
                            <span class="stat-change positive">60% completed</span>
                        </div>
                    </div>
                </div>
            </section>

            </main>
    </div>

    <script>
        // Navigation Functions
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Dashboard overview is the only content shown
        });
    </script>
</body>
</html>
