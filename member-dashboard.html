<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Member Dashboard</h1>
            </div>
        </div>
        <div class="header-right">

                        <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span id="headerMemberName">Member</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#dashboard">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                                        <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li>
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Overview -->
            <section class="dashboard-overview">
                <h2>Dashboard Overview</h2>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-weight"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Current Weight</h3>
                            <p class="stat-number" id="dashWeightDisplay">-- kg</p>
                            <span class="stat-change neutral" id="dashWeightChange">From registration</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-ruler-vertical"></i>
                        </div>
                        <div class="stat-content">
                            <h3>BMI</h3>
                            <p class="stat-number" id="dashBmiDisplay">--</p>
                            <span class="stat-change neutral" id="dashBmiStatus">Normal Range</span>
                        </div>
                    </div>

                    
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-trophy"></i>
                        </div>
                        <div class="stat-content">
                            <h3>Fitness Goal</h3>
                            <p class="stat-number" style="font-size:1.1rem;" id="dashGoalDisplay">--</p>
                            <span class="stat-change neutral">Registered goal</span>
                        </div>
                    </div>
                </div>
            </section>

            </main>
    </div>

    <script>
        // Navigation Functions
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        // Helper: BMI category label
        function bmiCategory(bmi) {
            if (bmi < 18.5) return 'Underweight';
            if (bmi < 25)   return 'Normal Range';
            if (bmi < 30)   return 'Overweight';
            return 'Obese';
        }

        // Goal label map
        const goalLabels = {
            'weight-loss':   'Weight Loss',
            'muscle-gain':   'Muscle Gain',
            'endurance':     'Improve Endurance',
            'strength':      'Build Strength',
            'flexibility':   'Increase Flexibility',
            'general':       'General Fitness'
        };

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // One-time cleanup for legacy mock data if detected
            const memberDataRaw = localStorage.getItem('memberData');
            const progressHistoryRaw = localStorage.getItem('progressHistory');
            
            // Check for the specific legacy mock data values
            if (memberDataRaw && memberDataRaw.includes('78')) {
                localStorage.removeItem('memberData');
                localStorage.removeItem('progressHistory');
                localStorage.removeItem('assignedWorkoutPlan');
                localStorage.removeItem('assignedDietPlan');
                window.location.reload(); // Refresh to show blank state
                return;
            }

            const memberData = JSON.parse(localStorage.getItem('memberData') || '{}');

            // Header name
            if (memberData.fullName) {
                document.getElementById('headerMemberName').textContent = memberData.fullName;
            }

            // Weight — use latest progress entry if available, else registration weight
            const progressHistory = JSON.parse(localStorage.getItem('progressHistory') || '[]');
            progressHistory.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
            const currentWeight = progressHistory.length > 0
                ? parseFloat(progressHistory[0].weight)
                : (parseFloat(memberData.weight) || null);
            const regWeight = parseFloat(memberData.weight) || null;

            if (currentWeight !== null) {
                document.getElementById('dashWeightDisplay').textContent = currentWeight.toFixed(1) + ' kg';
                if (regWeight !== null && currentWeight !== regWeight) {
                    const diff = (currentWeight - regWeight).toFixed(1);
                    document.getElementById('dashWeightChange').textContent =
                        (diff > 0 ? '+' : '') + diff + ' kg since registration';
                    document.getElementById('dashWeightChange').className =
                        'stat-change ' + (diff < 0 ? 'positive' : diff > 0 ? 'negative' : 'neutral');
                } else {
                    document.getElementById('dashWeightChange').textContent = 'Registration weight';
                }
            }

            // BMI
            const height = parseFloat(memberData.height);
            if (currentWeight && height) {
                const hm = height / 100;
                const bmi = (currentWeight / (hm * hm)).toFixed(1);
                document.getElementById('dashBmiDisplay').textContent = bmi;
                document.getElementById('dashBmiStatus').textContent = bmiCategory(parseFloat(bmi));
            }

            // Fitness goal
            if (memberData.fitnessGoal) {
                document.getElementById('dashGoalDisplay').textContent =
                    goalLabels[memberData.fitnessGoal] || memberData.fitnessGoal;
            }
        });
    </script>
</body>
</html>
