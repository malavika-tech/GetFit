<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Admin Dashboard</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>Admin</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="admin-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="admin-members.html">
                            <i class="fas fa-users"></i>
                            Members
                        </a>
                    </li>
                    <li>
                        <a href="admin-trainers.html">
                            <i class="fas fa-user-tie"></i>
                            Trainers
                        </a>
                    </li>
                    <li>
                        <a href="admin-memberships.html">
                            <i class="fas fa-id-card"></i>
                            Memberships
                        </a>
                    </li>
                    <li>
                        <a href="admin-assign-trainer.html">
                            <i class="fas fa-user-plus"></i>
                            Assign Trainer
                        </a>
                    </li>
                    <li class="active">
                        <a href="admin-settings.html">
                            <i class="fas fa-cog"></i>
                            Settings
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Settings Management -->
            <section class="settings-management">
                <div class="section-header">
                    <h2>System Settings</h2>
                </div>

                <!-- Settings Grid -->
                <div class="settings-grid">
                    <!-- Profile Settings -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3><i class="fas fa-user"></i> Profile Settings</h3>
                        </div>
                        <div class="card-body">
                            <form class="settings-form">
                                <div class="form-group">
                                    <label>Name</label>
                                    <input type="text" class="form-control" value="Malivaka" required>
                                </div>
                                <div class="form-group">
                                    <label>Username</label>
                                    <input type="text" class="form-control" value="malivaka_admin" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control" value="admin@getfit.com" required>
                                </div>
                                <div class="form-group">
                                    <label>Phone</label>
                                    <input type="tel" class="form-control" value="+1 555-987-6543" required>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Gym Info -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3><i class="fas fa-building"></i> Gym Info</h3>
                        </div>
                        <div class="card-body">
                            <form class="settings-form">
                                <div class="form-group">
                                    <label>Gym Name</label>
                                    <input type="text" class="form-control" value="GetFit" required>
                                </div>
                                <div class="form-group">
                                    <label>Address</label>
                                    <textarea class="form-control" rows="2" required>123 Fitness St, New York, NY 10001</textarea>
                                </div>
                                <div class="form-group">
                                    <label>Contact Email.</label>
                                    <input type="email" class="form-control" value="contact@getfit.com" required>
                                </div>
                                <div class="form-group">
                                    <label>Contact Phone</label>
                                    <input type="tel" class="form-control" value="+1 555-123-4567" required>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Info
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3><i class="fas fa-lock"></i> Change Password</h3>
                        </div>
                        <div class="card-body">
                            <form class="settings-form">
                                <div class="form-group">
                                    <label>Current Password</label>
                                    <div class="password-input">
                                        <input type="password" class="form-control" id="currentPassword" required>
                                        <button type="button" class="toggle-password" onclick="togglePassword('currentPassword')">
                                            <i class="fas fa-eye" id="currentToggleIcon"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>New Password</label>
                                    <div class="password-input">
                                        <input type="password" class="form-control" id="newPassword" required>
                                        <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                                            <i class="fas fa-eye" id="newToggleIcon"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Confirm Password</label>
                                    <div class="password-input">
                                        <input type="password" class="form-control" id="confirmPassword" required>
                                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                            <i class="fas fa-eye" id="confirmToggleIcon"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-key"></i> Update Password
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- User Management Settings -->
                    <div class="settings-card">
                        <div class="card-header">
                            <h3><i class="fas fa-users-cog"></i> User Managment Settings</h3>
                        </div>
                        <div class="card-body">
                            <form class="settings-form">
                                <div class="form-group">
                                    <label>Allow New Registrations</label>
                                    <div class="toggle-container">
                                        <div class="attendance-toggle">
                                            <button type="button" class="toggle-btn active" onclick="toggleSetting(this, 'allowRegistrations')">ON</button>
                                            <button type="button" class="toggle-btn" onclick="toggleSetting(this, 'allowRegistrations')">OFF</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Maximum Members Limit</label>
                                    <input type="number" class="form-control" value="500" min="1" max="10000">
                                </div>
                                <div class="form-group">
                                    <label>Auto-assign Trainer</label>
                                    <div class="toggle-container">
                                        <div class="attendance-toggle">
                                            <button type="button" class="toggle-btn" onclick="toggleSetting(this, 'autoAssignTrainer')">ON</button>
                                            <button type="button" class="toggle-btn active" onclick="toggleSetting(this, 'autoAssignTrainer')">OFF</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Settings
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Password toggle functions
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggleIcon = document.getElementById(inputId + 'ToggleIcon');

            if (input.type === 'password') {
                input.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Toggle setting function
        function toggleSetting(button, setting) {
            const container = button.parentElement;
            const buttons = container.querySelectorAll('.toggle-btn');

            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            console.log(`${setting} set to: ${button.textContent}`);
        }

        // Form submission handlers
        document.querySelectorAll('.settings-form').forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const submitBtn = form.querySelector('.btn-primary');
                const originalText = submitBtn.innerHTML;

                // Show loading state
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                submitBtn.disabled = true;

                // Simulate save operation
                setTimeout(() => {
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Saved!';
                    setTimeout(() => {
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                    }, 2000);
                }, 1500);
            });
        });
    </script>
</body>
</html>
