<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="member-dashboard">
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Member Profile</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span id="headerMemberName">Member</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="member-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="active">
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li>
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Profile Section -->
            <section class="profile-section">
                <div class="profile-container">
                    <div class="profile-card">
                        <h2>Profile Information</h2>
                        <div class="profile-header">
                            <div class="member-id">Member Account Details</div>
                        </div>
                        <div class="member-name" id="profileDisplayName">--</div>
                        <div class="profile-details">
                            <div class="detail-item">
                                <label>Name:</label>
                                <span id="profileName">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Age:</label>
                                <span id="profileAge">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Height:</label>
                                <span id="profileHeight">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Weight:</label>
                                <span id="profileWeight">--</span>
                            </div>
                            <div class="detail-item">
                                <label>BMI:</label>
                                <span id="profileBmi">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Fitness Goal:</label>
                                <span id="profileGoal">--</span>
                            </div>
                            <div class="detail-item">
                                <label>Membership Plan:</label>
                                <span id="profilePlan">--</span>
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="btn btn-admin btn-compact" onclick="editProfile()">
                                <i class="fas fa-edit"></i>
                                Update Profile
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal-container" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #333; margin: 0;">Update Profile</h3>
                <button type="button" class="modal-close" onclick="closeEditProfileModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #333;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form class="profile-form" id="editProfileForm">
                    <div class="form-group">
                        <label style="color: black;">Name</label>
                        <input type="text" id="editName" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Age</label>
                        <input type="number" id="editAge" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Height (cm)</label>
                        <input type="number" id="editHeight" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Weight (kg)</label>
                        <input type="number" id="editWeight" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Fitness Goal</label>
                        <select id="editGoals" style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                            <option value="weight-loss">Weight Loss</option>
                            <option value="muscle-gain">Muscle Gain</option>
                            <option value="endurance">Improve Endurance</option>
                            <option value="strength">Build Strength</option>
                            <option value="flexibility">Increase Flexibility</option>
                            <option value="general">General Fitness</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const goalLabels = {
            'weight-loss':  'Weight Loss',
            'muscle-gain':  'Muscle Gain',
            'endurance':    'Improve Endurance',
            'strength':     'Build Strength',
            'flexibility':  'Increase Flexibility',
            'general':      'General Fitness'
        };

        function bmiCategory(bmi) {
            if (bmi < 18.5) return 'Underweight';
            if (bmi < 25)   return 'Normal';
            if (bmi < 30)   return 'Overweight';
            return 'Obese';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        function editProfile() {
            const d = JSON.parse(localStorage.getItem('memberData') || '{}');
            document.getElementById('editName').value   = d.fullName || '';
            document.getElementById('editAge').value    = d.age      || '';
            document.getElementById('editHeight').value = d.height   || '';
            document.getElementById('editWeight').value = d.weight   || '';
            const sel = document.getElementById('editGoals');
            if (d.fitnessGoal) sel.value = d.fitnessGoal;
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        function closeEditProfileModal() {
            document.getElementById('editProfileModal').style.display = 'none';
        }

        document.getElementById('editProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const d = JSON.parse(localStorage.getItem('memberData') || '{}');
            d.fullName    = document.getElementById('editName').value;
            d.age         = document.getElementById('editAge').value;
            d.height      = parseFloat(document.getElementById('editHeight').value);
            d.weight      = parseFloat(document.getElementById('editWeight').value);
            d.fitnessGoal = document.getElementById('editGoals').value;
            localStorage.setItem('memberData', JSON.stringify(d));
            renderProfile(d);
            alert('Profile updated successfully!');
            closeEditProfileModal();
        });

        function renderProfile(d) {
            const h   = parseFloat(d.height) || 0;
            const w   = parseFloat(d.weight) || 0;
            const hm  = h / 100;
            const bmi = (h && w) ? (w / (hm * hm)).toFixed(1) : '--';
            const bmiLabel  = (h && w) ? bmiCategory(parseFloat(bmi)) : '';
            const goalLabel = goalLabels[d.fitnessGoal] || d.fitnessGoal || '--';
            const planLabel = d.membershipPlan
                ? d.membershipPlan.charAt(0).toUpperCase() + d.membershipPlan.slice(1)
                : '--';

            document.getElementById('headerMemberName').textContent   = d.fullName || 'Member';
            document.getElementById('profileDisplayName').textContent  = d.fullName || '--';
            document.getElementById('profileName').textContent    = d.fullName || '--';
            document.getElementById('profileAge').textContent     = d.age ? d.age + ' years' : '--';
            document.getElementById('profileHeight').textContent  = h ? h + ' cm' : '--';
            document.getElementById('profileWeight').textContent  = w ? w + ' kg' : '--';
            document.getElementById('profileBmi').textContent     = (h && w) ? bmi + ' (' + bmiLabel + ')' : '--';
            document.getElementById('profileGoal').textContent    = goalLabel;
            document.getElementById('profilePlan').textContent    = planLabel;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const d = JSON.parse(localStorage.getItem('memberData') || '{}');
            renderProfile(d);
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('editProfileModal');
            if (event.target === modal) closeEditProfileModal();
        };
    </script>
</body>
</html>
