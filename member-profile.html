<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GetFit Online Fitness Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="member-dashboard">
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fas fa-dumbbell"></i>
                <span>GetFit</span>
            </div>
            <div class="system-name">
                <h1>Member Profile</h1>
            </div>
        </div>
        <div class="header-right">

            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>John Doe</span>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="member-dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="active">
                        <a href="member-profile.html">
                            <i class="fas fa-user"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a href="member-membership.html">
                            <i class="fas fa-id-card"></i>
                            Membership
                        </a>
                    </li>
                    <li>
                        <a href="member-workout.html">
                            <i class="fas fa-dumbbell"></i>
                            Workout Plan
                        </a>
                    </li>
                    <li>
                        <a href="member-diet.html">
                            <i class="fas fa-utensils"></i>
                            Diet Plan
                        </a>
                    </li>
                                        <li>
                        <a href="member-progress.html">
                            <i class="fas fa-chart-line"></i>
                            Progress
                        </a>
                    </li>
                    <li>
                        <a href="member-trainer.html">
                            <i class="fas fa-user-tie"></i>
                            My Trainer
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Profile Section -->
            <section class="profile-section">
                <div class="profile-container">
                    <div class="profile-card">
                        <h2>Profile Information</h2>
                        <div class="profile-header">
                            <div class="member-id">Member ID: M001</div>
                        </div>
                        <div class="member-name">John Doe</div>
                        <div class="profile-details">
                            <div class="detail-item">
                                <label>Name:</label>
                                <span>John Doe</span>
                            </div>
                            <div class="detail-item">
                                <label>Age:</label>
                                <span>28 years</span>
                            </div>
                            <div class="detail-item">
                                <label>Height:</label>
                                <span>175 cm</span>
                            </div>
                            <div class="detail-item">
                                <label>Weight:</label>
                                <span>75 kg</span>
                            </div>
                            <div class="detail-item">
                                <label>BMI:</label>
                                <span>24.5 (Normal)</span>
                            </div>
                            <div class="detail-item">
                                <label>Fitness Goals:</label>
                                <span>Weight Loss & Muscle Building</span>
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="btn btn-admin btn-compact" onclick="editProfile()">
                                <i class="fas fa-edit"></i>
                                Update Profile
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal-container" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #333; margin: 0;">Update Profile</h3>
                <button type="button" class="modal-close" onclick="closeEditProfileModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #333;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form class="profile-form" id="editProfileForm">
                    <div class="form-group">
                        <label style="color: black;">Name</label>
                        <input type="text" id="editName" value="John Doe" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Age</label>
                        <input type="number" id="editAge" value="28" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Height (cm)</label>
                        <input type="number" id="editHeight" value="175" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Weight (kg)</label>
                        <input type="number" id="editWeight" value="75" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group">
                        <label style="color: black;">Fitness Goals</label>
                        <input type="text" id="editGoals" value="Weight Loss & Muscle Building" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        function editProfile() {
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        function closeEditProfileModal() {
            document.getElementById('editProfileModal').style.display = 'none';
        }

        document.getElementById('editProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // In a real app we'd update DOM or send to server
            alert('Profile updated successfully!');
            closeEditProfileModal();
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Profile page is already active
        });
    </script>
</body>
</html>
